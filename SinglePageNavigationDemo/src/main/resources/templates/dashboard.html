<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>School Portal</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            margin:0;
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        td{
            border:1px solid black;
            padding:10px;
            vertical-align:top;
        }

        a{
            text-decoration:none;
            color:black;
            margin-right:20px;
        }

        .header{
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .menu p{
            margin:20px 0;
            text-align:center;
        }

        .content{
            min-height:450px;
        }

        .right-image{
            text-align:center;
        }

        .footer{
            display:flex;
            justify-content:space-between;
            align-items:center;
        }
    </style>

</head>

<body>

<table>

    <!-- Header -->

    <tr height="70">
        <td colspan="3">

            <div class="header">

                <div>

                    <a th:href="@{/}" target="_blank">Home</a>

                    <a th:href="@{/about}" target="_blank">About</a>

                    <a th:href="@{/contact}" target="_blank">Contact</a>

                    <a th:href="@{/student}" target="_blank">Student Detail</a>

                </div>

                <div>

                    <img src="/images/B.jpg"
                         alt="Profile"
                         width="50"
                         height="50">

                </div>

            </div>

        </td>
    </tr>

    <!-- Main Section -->

    <tr height="500">

        <!-- Left Navigation -->

        <td width="15%" class="menu">

            <p>
                <a th:href="@{/image1}">Image 1</a>
            </p>

            <hr>

            <p>
                <a th:href="@{/image2}">Image 2</a>
            </p>

            <hr>

            <p>
                <a th:href="@{/image3}">Image 3</a>
            </p>

        </td>

        <!-- Content -->

        <td width="65%" class="content">

            <h2 th:text="${title}"></h2>

            <p th:if="${message}" th:text="${message}"></p>

            <p th:if="${name}">
                <b>Name :</b>
                <span th:text="${name}"></span>
            </p>

            <p th:if="${course}">
                <b>Course :</b>
                <span th:text="${course}"></span>
            </p>

            <p th:if="${semester}">
                <b>Semester :</b>
                <span th:text="${semester}"></span>
            </p>

            <p th:if="${college}">
                <b>College :</b>
                <span th:text="${college}"></span>
            </p>

            <h3 th:if="${image1}" th:text="${image1}"></h3>

            <h3 th:if="${image2}" th:text="${image2}"></h3>

            <h3 th:if="${image3}" th:text="${image3}"></h3>

        </td>

        <!-- Right Image -->

        <td width="20%" class="right-image">

            <img src="/images/B.jpg"
                 alt="School"
                 width="180"
                 height="250">

        </td>

    </tr>

	<!-- Footer -->

	<tr height="60">

	    <td colspan="3">

	        <div class="footer">

	            <div>

	                <!-- Facebook -->
	                <a href="https://www.facebook.com" target="_blank" title="Facebook">
	                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28"
	                        viewBox="0 0 24 24" fill="#1877F2">
	                        <path d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073c0 6.019 
	                        4.388 11.009 10.125 11.927v-8.437H7.078v-3.49h3.047V9.413
	                        c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235
	                        2.686.235v2.953h-1.514c-1.491 0-1.956.925-1.956
	                        1.874v2.25h3.328l-.532 3.49h-2.796V24C19.612
	                        23.082 24 18.092 24 12.073z"/>
	                    </svg>
	                </a>

	                &nbsp;&nbsp;

	                <!-- Instagram -->
	                <a href="https://www.instagram.com" target="_blank" title="Instagram">
	                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28"
	                        viewBox="0 0 24 24" fill="#E4405F">
	                        <path d="M7.75 2C4.574 2 2 4.574 2 7.75v8.5C2
	                        19.426 4.574 22 7.75 22h8.5C19.426 22 22
	                        19.426 22 16.25v-8.5C22 4.574 19.426 2
	                        16.25 2h-8.5zm0 2h8.5A3.75 3.75 0 0120
	                        7.75v8.5A3.75 3.75 0 0116.25 20h-8.5A3.75
	                        3.75 0 014 16.25v-8.5A3.75 3.75 0 017.75
	                        4zm8.75 1a1.25 1.25 0 100 2.5 1.25 1.25
	                        0 000-2.5zM12 7a5 5 0 100 10 5 5 0
	                        000-10zm0 2a3 3 0 110 6 3 3 0
	                        010-6z"/>
	                    </svg>
	                </a>

	                &nbsp;&nbsp;

	                <!-- LinkedIn -->
	                <a href="https://www.linkedin.com" target="_blank" title="LinkedIn">
	                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28"
	                        viewBox="0 0 24 24" fill="#0A66C2">
	                        <path d="M20.447 20.452H16.89v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853
	                        0-2.136 1.445-2.136 2.939v5.667H9.346V9h3.414v1.561h.049c.476-.9
	                        1.637-1.85 3.37-1.85 3.604 0 4.268 2.372
	                        4.268 5.455v6.286zM5.337 7.433a2.063
	                        2.063 0 110-4.126 2.063 2.063 0
	                        010 4.126zM7.119 20.452H3.555V9h3.564v11.452z"/>
	                    </svg>
	                </a>

	            </div>

	            <div>
	                <b>Contact Us</b>
	            </div>

	        </div>

	    </td>

	</tr>

</table>

</body>

</html>
